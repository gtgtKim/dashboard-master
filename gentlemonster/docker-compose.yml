services:
  app:
    build: .
    image: gentlemonster-main-scrapping:local
    init: true
    shm_size: "1gb"
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-4173}:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      TZ: ${CAPTURE_TIMEZONE:-America/New_York}
      BASE_PATH: ${BASE_PATH:-}
      GA4_METRICS_ENABLED: ${GA4_METRICS_ENABLED:-true}
      GA4_ACCOUNT_ID: ${GA4_ACCOUNT_ID:-49553718}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID:-307903899}
      GA4_WISHLIST_QUANTITY_METRIC: ${GA4_WISHLIST_QUANTITY_METRIC:-customEvent:quantity}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/ga4-key.json
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-jellyfish}
      DASHBOARD_AUTH_SECRET: ${DASHBOARD_AUTH_SECRET:-change-this-dashboard-secret}
      DASHBOARD_REQUIRE_HTTPS: ${DASHBOARD_REQUIRE_HTTPS:-false}
      DASHBOARD_COOKIE_DAYS: ${DASHBOARD_COOKIE_DAYS:-7}
    volumes:
      - ./snapshots:/app/snapshots
      - ../gyutae-test-project-f714548c9b52.json:/run/secrets/ga4-key.json:ro
    command: npm run serve

  scheduler:
    image: gentlemonster-main-scrapping:local
    restart: unless-stopped
    init: true
    shm_size: "1gb"
    environment:
      TZ: ${CAPTURE_TIMEZONE:-America/New_York}
      CAPTURE_TIMEZONE: ${CAPTURE_TIMEZONE:-America/New_York}
      CAPTURE_SCHEDULE_HOUR: 10
      CAPTURE_SCHEDULE_MINUTE: 0
      CAPTURE_RETRY_ATTEMPTS: 6
      CAPTURE_RETRY_DELAY_MS: 600000
      GA4_METRICS_ENABLED: ${GA4_METRICS_ENABLED:-true}
      GA4_ACCOUNT_ID: ${GA4_ACCOUNT_ID:-49553718}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID:-307903899}
      GA4_WISHLIST_QUANTITY_METRIC: ${GA4_WISHLIST_QUANTITY_METRIC:-customEvent:quantity}
    volumes:
      - ./snapshots:/app/snapshots
    command: npm run schedule

  capture:
    image: gentlemonster-main-scrapping:local
    profiles:
      - capture
    init: true
    shm_size: "1gb"
    environment:
      TZ: ${CAPTURE_TIMEZONE:-America/New_York}
      CAPTURE_TIMEZONE: ${CAPTURE_TIMEZONE:-America/New_York}
      GA4_METRICS_ENABLED: ${GA4_METRICS_ENABLED:-true}
      GA4_ACCOUNT_ID: ${GA4_ACCOUNT_ID:-49553718}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID:-307903899}
      GA4_WISHLIST_QUANTITY_METRIC: ${GA4_WISHLIST_QUANTITY_METRIC:-customEvent:quantity}
    volumes:
      - ./snapshots:/app/snapshots
    command: npm run capture:retry
